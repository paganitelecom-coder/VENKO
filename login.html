<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carrera Telecom – Entrar</title>
<meta name="theme-color" content="#C10007">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --primary:       #C10007;
    --primary-light: #FF4D2E;
    --grad:          linear-gradient(135deg, #C10007 0%, #FF4D2E 100%);
    --bg:            #FFF5F4;
    --white:         #FFFFFF;
    --text:          #1E293B;
    --muted:         #64748B;
    --border:        #CBD5E1;
    --error:         #EF4444;
    --r:             12px;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  /* diagonal split background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: var(--grad);
    clip-path: polygon(0 0, 100% 0, 100% 38%, 0 62%);
    z-index: 0;
  }

  .wrap {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 400px;
  }

  .brand {
    text-align: center;
    margin-bottom: 32px;
  }
  .brand-logo {
    width: 112px; height: 112px;
    background: white;
    border-radius: 26px;
    display: inline-flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 32px rgba(193, 0, 7,0.25);
    margin-bottom: 14px;
    padding: 12px;
  }
  .brand-logo img { width: 100%; height: 100%; object-fit: contain; }
  .brand h1 {
    font-size: 1.5rem; font-weight: 800;
    color: white; letter-spacing: -0.5px;
  }
  .brand p { font-size: 0.85rem; color: rgba(255,255,255,0.8); margin-top: 4px; }

  .card {
    background: var(--white);
    border-radius: var(--r);
    box-shadow: 0 20px 60px rgba(193, 0, 7,0.12), 0 4px 16px rgba(0,0,0,0.06);
    padding: 36px 32px 32px;
  }

  .card h2 {
    font-size: 1.15rem; font-weight: 700;
    color: var(--text); margin-bottom: 6px;
  }
  .card .sub {
    font-size: 0.8rem; color: var(--muted);
    margin-bottom: 28px;
  }

  .field { margin-bottom: 18px; }
  .field label {
    display: block;
    font-size: 0.72rem; font-weight: 700;
    color: var(--muted);
    letter-spacing: 0.5px; text-transform: uppercase;
    margin-bottom: 6px;
  }
  .field input {
    width: 100%;
    padding: 12px 16px;
    font-family: 'Inter', sans-serif;
    font-size: 0.95rem;
    color: var(--text);
    background: #F8FAFC;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  .field input:focus {
    border-color: var(--primary-light);
    box-shadow: 0 0 0 3px rgba(255, 77, 46,0.15);
    background: white;
  }
  .field input.erro { border-color: var(--error); }

  .msg-erro {
    background: #FEF2F2; border: 1px solid #FECACA;
    color: #991B1B; border-radius: 8px;
    padding: 11px 14px; font-size: 0.8rem; font-weight: 600;
    margin-bottom: 16px; display: none; align-items: center; gap: 8px;
  }
  .msg-erro.show { display: flex; }

  .btn-entrar {
    width: 100%; padding: 14px;
    background: var(--grad); color: white;
    border: none; border-radius: 8px;
    font-family: 'Inter', sans-serif; font-size: 1rem; font-weight: 700;
    cursor: pointer; transition: transform .15s, box-shadow .15s;
    box-shadow: 0 4px 18px rgba(193, 0, 7,0.35);
    margin-top: 4px;
  }
  .btn-entrar:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(193, 0, 7,0.45); }
  .btn-entrar:disabled { opacity: .6; transform: none; cursor: not-allowed; }

  .hint {
    margin-top: 24px; padding-top: 20px;
    border-top: 1px solid #F1F5F9;
    font-size: 0.72rem; color: var(--muted); line-height: 1.8;
  }
  .hint strong { color: var(--text); }
  .hint .chip {
    display: inline-block;
    background: #FFF5F4; color: var(--primary);
    border: 1px solid #FFC9C2;
    border-radius: 4px; padding: 1px 7px;
    font-family: 'DM Mono', monospace; font-size: 0.72rem;
    font-weight: 500;
  }

  .version {
    text-align: center; margin-top: 20px;
    font-size: 0.68rem; color: rgba(193, 0, 7,0.5);
  }

  @media (max-width: 440px) {
    .card { padding: 28px 20px 24px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <div class="brand-logo"><img src="logo-carrera.png" alt="Carrera Telecom"></div>
    <h1>CARRERA TELECOM</h1>
    <p>Ficha de Vendas · Sistema Comercial</p>
  </div>

  <div class="card">
    <h2>Entrar na sua conta</h2>
    <p class="sub">Use seu usuário e senha fornecidos pelo administrador.</p>

    <div class="msg-erro" id="msg-erro">❌ <span id="erro-txt">Usuário ou senha incorretos.</span></div>

    <div class="field">
      <label>Usuário</label>
      <input type="text" id="usuario" placeholder="seu.usuario" autocomplete="username" autofocus>
    </div>
    <div class="field">
      <label>Senha</label>
      <input type="password" id="senha" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn-entrar" id="btn-entrar" onclick="entrar()">Entrar →</button>
  </div>

  <div class="version">CARRERA TELECOM v2.0 · Ficha de Vendas</div>
</div>

<script>
  const SHEETS_URL = "https://script.google.com/macros/s/AKfycbwRo3WixS8Lg_FycKV53snEqtEJInEcUlDJiHkq2cY_t6e1sAvO-rb8BPvO3mDocuqqyw/exec";

  async function entrar() {
    const u = document.getElementById('usuario').value.trim().toLowerCase();
    const p = document.getElementById('senha').value;
    const btn = document.getElementById('btn-entrar');

    if (!u || !p) {
      mostrarErro('Preencha o usuário e a senha.');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Verificando...';

    try {
      const url = SHEETS_URL + '?action=login&username=' + encodeURIComponent(u) + '&password=' + encodeURIComponent(p);
      const resp = await fetch(url, { cache: 'no-store' });
      const dados = await resp.json();

      if (dados.status === 'ok' && dados.user) {
        sessionStorage.setItem('venko_session', JSON.stringify({
          username: dados.user.username,
          name: dados.user.name,
          role: dados.user.role,
          loginAt: Date.now()
        }));
        window.location.href = 'index.html';
      } else {
        mostrarErro(dados.msg || 'Usuário ou senha incorretos.');
        btn.disabled = false;
        btn.textContent = 'Entrar →';
        document.getElementById('senha').value = '';
      }
    } catch (err) {
      mostrarErro('Falha de conexão. Verifique sua internet e tente novamente.');
      btn.disabled = false;
      btn.textContent = 'Entrar →';
    }
  }

  function mostrarErro(msg) {
    const el = document.getElementById('msg-erro');
    document.getElementById('erro-txt').textContent = msg;
    el.classList.add('show');
    [document.getElementById('usuario'), document.getElementById('senha')]
      .forEach(i => i.classList.add('erro'));
    setTimeout(() => {
      el.classList.remove('show');
      document.querySelectorAll('.erro').forEach(i => i.classList.remove('erro'));
    }, 4000);
  }

  // Enter key
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') entrar();
  });

  // Se já logado, redirecionar
  if (sessionStorage.getItem('venko_session')) {
    window.location.href = 'index.html';
  }
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
