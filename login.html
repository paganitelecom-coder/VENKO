<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carrera Telecom – Entrar</title>
<meta name="theme-color" content="#C10007">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* Cor */
    --primary:        #C10007;
    --primary-hover:  #A30006;
    --accent:         #FF4D2E;
    --grad:           linear-gradient(135deg, #C10007 0%, #FF4D2E 100%);
    --bg:             #FFF5F4;
    --surface:        #FFFFFF;
    --text:           #1E293B;
    --muted:          #64748B;
    --border:         #E2E8F0;
    --error:          #EF4444;
    --error-bg:       #FEF2F2;

    /* Escala de espaçamento */
    --space-1: 4px;  --space-2: 8px;  --space-3: 12px;
    --space-4: 16px; --space-5: 24px; --space-6: 32px;

    /* Raio */
    --radius-sm: 8px; --radius-md: 14px; --radius-lg: 22px;

    /* Sombra e transição */
    --shadow-card: 0 20px 48px -12px rgba(193,0,7,.18), 0 4px 12px rgba(0,0,0,.04);
    --shadow-btn:  0 8px 20px rgba(193,0,7,.30);
    --ease:        150ms cubic-bezier(.4,0,.2,1);
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: var(--space-5);
    -webkit-font-smoothing: antialiased;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: var(--grad);
    clip-path: polygon(0 0, 100% 0, 100% 38%, 0 62%);
    z-index: 0;
  }

  main.wrap {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 400px;
  }

  header.brand {
    text-align: center;
    margin-bottom: var(--space-6);
  }
  .brand-logo {
    width: 112px; height: 112px;
    background: var(--surface);
    border-radius: var(--radius-lg);
    display: inline-flex; align-items: center; justify-content: center;
    box-shadow: 0 10px 32px rgba(193,0,7,.28);
    margin-bottom: var(--space-3);
    padding: 12px;
  }
  .brand-logo img { width: 100%; height: 100%; object-fit: contain; }
  .brand h1 {
    font-size: 1.5rem; font-weight: 800;
    color: white; letter-spacing: -0.5px;
  }
  .brand p { font-size: 0.85rem; color: rgba(255,255,255,0.85); margin-top: var(--space-1); }

  section.card {
    background: var(--surface);
    border-radius: var(--radius-md);
    box-shadow: var(--shadow-card);
    padding: 36px 32px 32px;
  }

  .card h2 {
    font-size: 1.2rem; font-weight: 700;
    color: var(--text); margin-bottom: var(--space-1);
  }
  .card .sub {
    font-size: 0.82rem; color: var(--muted);
    margin-bottom: var(--space-5);
  }

  .field { margin-bottom: var(--space-4); }
  .field label {
    display: block;
    font-size: 0.72rem; font-weight: 700;
    color: var(--muted);
    letter-spacing: 0.5px; text-transform: uppercase;
    margin-bottom: var(--space-2);
  }
  .field input {
    width: 100%;
    padding: 13px 16px;
    font-family: 'Inter', sans-serif;
    font-size: 0.95rem;
    color: var(--text);
    background: #F8FAFC;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    outline: none;
    transition: border-color var(--ease), box-shadow var(--ease), background var(--ease);
  }
  .field input:hover { border-color: #CBD5E1; }
  .field input:focus-visible {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px rgba(255,77,46,.16);
    background: white;
  }
  .field input.erro { border-color: var(--error); }
  .field input.erro:focus-visible { box-shadow: 0 0 0 4px rgba(239,68,68,.15); }

  [role="alert"] {
    background: var(--error-bg); border: 1px solid #FECACA;
    color: #991B1B; border-radius: var(--radius-sm);
    padding: 11px 14px; font-size: 0.8rem; font-weight: 600;
    margin-bottom: var(--space-4); display: none; align-items: center; gap: var(--space-2);
  }
  [role="alert"].show { display: flex; }

  .btn-entrar {
    width: 100%; padding: 15px;
    background: var(--grad); color: white;
    border: none; border-radius: var(--radius-sm);
    font-family: 'Inter', sans-serif; font-size: 1rem; font-weight: 700;
    cursor: pointer;
    transition: transform var(--ease), box-shadow var(--ease), filter var(--ease);
    box-shadow: var(--shadow-btn);
    margin-top: var(--space-1);
  }
  .btn-entrar:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 12px 28px rgba(193,0,7,.4); }
  .btn-entrar:active:not(:disabled) { transform: translateY(0); filter: brightness(.96); }
  .btn-entrar:focus-visible { outline: 3px solid rgba(255,77,46,.5); outline-offset: 2px; }
  .btn-entrar:disabled { opacity: .6; transform: none; cursor: not-allowed; }

  .hint {
    margin-top: var(--space-5); padding-top: var(--space-4);
    border-top: 1px solid #F1F5F9;
    font-size: 0.72rem; color: var(--muted); line-height: 1.8;
  }
  .hint strong { color: var(--text); }
  .hint .chip {
    display: inline-block;
    background: var(--bg); color: var(--primary);
    border: 1px solid #FFC9C2;
    border-radius: 4px; padding: 1px 7px;
    font-family: 'DM Mono', monospace; font-size: 0.72rem;
    font-weight: 500;
  }

  footer.version {
    text-align: center; margin-top: var(--space-5);
    font-size: 0.68rem; color: rgba(193,0,7,0.5);
  }

  @media (max-width: 440px) {
    section.card { padding: 28px 20px 24px; }
  }
</style>
</head>
<body>
<main class="wrap">
  <header class="brand">
    <div class="brand-logo"><img src="logo-carrera.png" alt="Carrera Telecom"></div>
    <h1>CARRERA TELECOM</h1>
    <p>Ficha de Vendas · Sistema Comercial</p>
  </header>

  <section class="card">
    <h2>Entrar na sua conta</h2>
    <p class="sub">Use seu usuário e senha fornecidos pelo administrador.</p>

    <div role="alert" id="msg-erro">❌ <span id="erro-txt">Usuário ou senha incorretos.</span></div>

    <form id="form-login" novalidate>
      <div class="field">
        <label for="usuario">Usuário</label>
        <input type="text" id="usuario" name="usuario" placeholder="seu.usuario" autocomplete="username" autofocus>
      </div>
      <div class="field">
        <label for="senha">Senha</label>
        <input type="password" id="senha" name="senha" placeholder="••••••••" autocomplete="current-password">
      </div>

      <button type="submit" class="btn-entrar" id="btn-entrar">Entrar →</button>
    </form>
  </section>

  <footer class="version">CARRERA TELECOM v2.0 · Ficha de Vendas</footer>
</main>

<script>
  const SHEETS_URL = "https://script.google.com/macros/s/AKfycbwRo3WixS8Lg_FycKV53snEqtEJInEcUlDJiHkq2cY_t6e1sAvO-rb8BPvO3mDocuqqyw/exec";

  document.getElementById('form-login').addEventListener('submit', function(e) {
    e.preventDefault();
    entrar();
  });

  async function entrar() {
    const u = document.getElementById('usuario').value.trim().toLowerCase();
    const p = document.getElementById('senha').value;
    const btn = document.getElementById('btn-entrar');

    if (!u || !p) {
      mostrarErro('Preencha o usuário e a senha.');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Verificando...';

    try {
      const url = SHEETS_URL + '?action=login&username=' + encodeURIComponent(u) + '&password=' + encodeURIComponent(p);
      const resp = await fetch(url, { cache: 'no-store' });
      const dados = await resp.json();

      if (dados.status === 'ok' && dados.user) {
        sessionStorage.setItem('venko_session', JSON.stringify({
          username: dados.user.username,
          name: dados.user.name,
          role: dados.user.role,
          loginAt: Date.now()
        }));
        window.location.href = 'index.html';
      } else {
        mostrarErro(dados.msg || 'Usuário ou senha incorretos.');
        btn.disabled = false;
        btn.textContent = 'Entrar →';
        document.getElementById('senha').value = '';
      }
    } catch (err) {
      mostrarErro('Falha de conexão. Verifique sua internet e tente novamente.');
      btn.disabled = false;
      btn.textContent = 'Entrar →';
    }
  }

  function mostrarErro(msg) {
    const el = document.getElementById('msg-erro');
    document.getElementById('erro-txt').textContent = msg;
    el.classList.add('show');
    [document.getElementById('usuario'), document.getElementById('senha')]
      .forEach(i => i.classList.add('erro'));
    setTimeout(() => {
      el.classList.remove('show');
      document.querySelectorAll('.erro').forEach(i => i.classList.remove('erro'));
    }, 4000);
  }

  // Se já logado, redirecionar
  if (sessionStorage.getItem('venko_session')) {
    window.location.href = 'index.html';
  }
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
